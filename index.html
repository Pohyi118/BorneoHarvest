<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeedShield ASEAN - Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .alert-card { border-left: 4px solid #ef4444; background: #1e293b; transition: transform 0.2s; }
        .alert-card:hover { transform: scale(1.01); }
        .base64-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #475569; }
    </style>
</head>
<body class="p-8">
    <header class="flex justify-between items-center mb-10 border-b border-gray-700 pb-5">
        <div>
            <h1 class="text-3xl font-bold text-green-400">SeedShield ASEAN</h1>
            <p class="text-gray-400 font-mono">Government & NGO Monitoring Dashboard</p>
        </div>
        <div class="text-right">
            <span class="bg-red-500 animate-pulse px-3 py-1 rounded-full text-xs font-bold">LIVE FEED</span>
        </div>
    </header>

    <main class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-3 grid grid-cols-3 gap-4 mb-4">
            <div class="bg-slate-800 p-4 rounded-lg">
                <p class="text-gray-400 text-sm">Total Reports</p>
                <p id="total-scans" class="text-2xl font-bold">0</p>
            </div>
            <div class="bg-slate-800 p-4 rounded-lg">
                <p class="text-gray-400 text-sm">Emergency Alerts</p>
                <p id="risk-count" class="text-2xl font-bold text-red-400">0</p>
            </div>
            <div class="bg-slate-800 p-4 rounded-lg">
                <p class="text-gray-400 text-sm">System Status</p>
                <p class="text-2xl font-bold text-blue-400">ONLINE</p>
            </div>
        </div>

        <div class="md:col-span-3">
            <h2 class="text-xl font-semibold mb-4 text-gray-200">Incoming Field Reports (DisasterReports)</h2>
            <div id="alerts-container" class="space-y-4">
                <p class="text-gray-500 italic">Connecting to Cristal's mobile feed...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrU2jqcg19Uls4K1-x8mQ9fB-uL4-PiJs",
            authDomain: "borneoharvest-adbe1.firebaseapp.com",
            projectId: "borneoharvest-adbe1",
            storageBucket: "borneoharvest-adbe1.firebasestorage.app",
            messagingSenderId: "821164721078",
            appId: "1:821164721078:web:2750651b30b64e30773717",
            measurementId: "G-79FMSWNNY7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UPDATED: Now listening to Cristal's "DisasterReports" collection
        const reportsRef = collection(db, "DisasterReports");
        const q = query(reportsRef, orderBy("timestamp", "desc"));

        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('alerts-container');
            container.innerHTML = ""; 
            
            let emergencyCount = 0;
            document.getElementById('total-scans').innerText = snapshot.size;

            snapshot.forEach((doc) => {
                const data = doc.data();
                
                // Logic: If title has an alert emoji, count as emergency
                if(data.title && data.title.includes("🚨")) emergencyCount++;

                // Logic: Handle the Image (Base64)
                let imageElement = "";
                if (data.imageBase64 && data.imageBase64 !== "NO_PHOTO") {
                    imageElement = `<img src="data:image/jpeg;base64,${data.imageBase64}" class="base64-img ml-4">`;
                } else {
                    imageElement = `<div class="w-20 h-20 bg-gray-700 rounded flex items-center justify-center text-[10px] text-gray-500 ml-4">NO PHOTO</div>`;
                }

                const card = document.createElement('div');
                card.className = "alert-card p-4 rounded shadow-lg flex justify-between items-center";
                card.innerHTML = `
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                             <h3 class="font-bold text-lg text-white">${data.title || "Untitled Report"}</h3>
                        </div>
                        <p class="text-sm text-gray-300 mt-1 italic">"${data.description || "No details provided."}"</p>
                        <div class="flex gap-4 mt-3">
                            <p class="text-xs text-green-400">📍 ${data.location || "Unknown Location"}</p>
                            <p class="text-xs text-blue-300">🕒 ${data.time || "No Time"}</p>
                        </div>
                    </div>
                    <div class="flex items-center">
                        ${imageElement}
                    </div>
                `;
                container.appendChild(card);
            });
            document.getElementById('risk-count').innerText = emergencyCount;
        });
    </script>
</body>
</html>
